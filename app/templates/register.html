<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="static/login.css">
</head>
<body>
  <div class="login-container">
    <!-- Left Section -->
    <div class="left-panel">
      <img class="logo-box mb-3" src="{{ url_for('static', filename='logo.png') }}"  >
      <h2>Audit Management System</h2>
    </div>

    <!-- Right Section -->
    <div class="right-panel">
      <div class="circle one"></div>
      <div class="circle two"></div>
      <div class="login-box">
        <h2>Register</h2>
        <form method="POST">
          <!-- CSRF disabled globally for chatbot API compatibility -->

          <input type="text" class="form-control" id="name" name="name" placeholder="User Name" required />
          <input type="email" class="form-control" id="email" name="email" placeholder="Email Id" required />
          <input type="password" class="form-control" id="password" name="password" placeholder="password" />
          <input type="text" class="form-control" id="state_name" name="state_name" placeholder="State Name" required />
          <!-- Role is assigned by the system/admin; users cannot self-select privileged roles. -->

          <button type="submit" class="btn btn-login">Register</button>
        </form>
        <div class="signup-text">
          Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

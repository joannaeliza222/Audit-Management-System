<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="static/login.css">
</head>
<body>
  <div class="login-container">
    <!-- Left Section -->
    <div class="left-panel">
      <img class="logo-box mb-3" src="{{ url_for('static', filename='logo.png') }}"  >
      <h2>Audit Management System</h2>
    </div>

    <!-- Right Section -->
    <div class="right-panel">
      <div class="circle one"></div>
      <div class="circle two"></div>
      <div class="login-box">
        <h2>Login</h2>
        
        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="container mt-3" style="position: fixed;
                    top: 35px;left: 50%; transform: translateX(-50%);
                    z-index: 2000;width: 40%;text-align: center;">
              {% for category, message in messages %}
                <div class="alert alert-{{ 'warning' if category == 'warn' else category }} alert-dismissible fade show" role="alert">
                  {{ message }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        
        <form method="POST">
          <!-- CSRF disabled globally for chatbot API compatibility -->
          <input type="email" class="form-control" id="email" name="email" placeholder="Email Address" required />
          <input type="password" class="form-control" id="password" name="password" placeholder="Password" required />

<!--          <div class="forgot-password">-->
<!--            <a href="#">forgot password?</a>-->
<!--          </div>-->

          <button type="submit" class="btn btn-login">Login</button>
        </form>
        <div class="signup-text">
          Don’t have any account? <a href="{{ url_for('auth.register') }}">Create an account</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
